    <div class="container">
        <h2 class="page-header">用户登录</h2>
        
        <div class="row">
            <div class="col-md-6 col-md-offset-3">
                <div class="panel panel-default">
                    <div class="panel-heading">
                        <h3 class="panel-title">请登录您的账户</h3>
                    </div>
                    <div class="panel-body">
                        <form role="form">
                            <div class="form-group">
                                <label for="username">用户名或邮箱</label>
                                <div class="input-group">
                                    <span class="input-group-addon"><span class="glyphicon glyphicon-user"></span></span>
                                    <input type="text" class="form-control" id="username" placeholder="请输入用户名或邮箱">
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="password">密码</label>
                                <div class="input-group">
                                    <span class="input-group-addon"><span class="glyphicon glyphicon-lock"></span></span>
                                    <input type="password" class="form-control" id="password" placeholder="请输入密码">
                                </div>
                            </div>
                            <div class="checkbox">
                                <label>
                                    <input type="checkbox"> 记住我
                                </label>
                            </div>
                            <button type="submit" class="btn btn-success btn-block">登录</button>
                        </form>
                    </div>
                    <div class="panel-footer">
                        <p>还没有账户？<a href="page9.html">立即注册</a></p>
                        <p><a href="#">忘记密码？</a></p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-12 text-center">
                <h3>第三方登录</h3>
                <button class="btn btn-primary"><span class="glyphicon glyphicon-globe"></span> 微信登录</button>
                <button class="btn btn-info"><span class="glyphicon glyphicon-globe"></span> QQ登录</button>
                <button class="btn btn-danger"><span class="glyphicon glyphicon-globe"></span> 微博登录</button>
            </div>
        </div>
    </div>
