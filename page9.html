    <div class="container">
        <h2 class="page-header">注册新账户</h2>
        
        <div class="row">
            <div class="col-md-8 col-md-offset-2">
                <div class="well">
                    <form role="form">
                        <h3>基本信息</h3>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="firstName">姓</label>
                                    <input type="text" class="form-control" id="firstName" placeholder="请输入您的姓">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="lastName">名</label>
                                    <input type="text" class="form-control" id="lastName" placeholder="请输入您的名">
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">邮箱地址</label>
                            <input type="email" class="form-control" id="email" placeholder="请输入您的邮箱地址">
                        </div>
                        
                        <h3>账户信息</h3>
                        <div class="form-group">
                            <label for="username">用户名</label>
                            <input type="text" class="form-control" id="username" placeholder="请输入用户名">
                        </div>
                        
                        <div class="form-group">
                            <label for="password">密码</label>
                            <input type="password" class="form-control" id="password" placeholder="请输入密码">
                        </div>
                        
                        <div class="form-group">
                            <label for="confirmPassword">确认密码</label>
                            <input type="password" class="form-control" id="confirmPassword" placeholder="请再次输入密码">
                        </div>
                        
                        <h3>其他信息</h3>
                        <div class="form-group">
                            <label>性别</label>
                            <div class="radio">
                                <label>
                                    <input type="radio" name="gender" id="gender1" value="male" checked> 男
                                </label>
                            </div>
                            <div class="radio">
                                <label>
                                    <input type="radio" name="gender" id="gender2" value="female"> 女
                                </label>
                            </div>
                        </div>
                        
                        <div class="checkbox">
                            <label>
                                <input type="checkbox" required> 我已阅读并同意<a href="#">用户协议</a>和<a href="#">隐私政策</a>
                            </label>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-lg">注册账户</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
